<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Panel background -->
  <rect x="4" y="8" width="56" height="48" rx="6" fill="#1a1a2e" stroke="#478CBF" stroke-width="2.5"/>

  <!-- Title bar -->
  <path d="M 6.5 10.5 L 57.5 10.5 L 57.5 16 L 6.5 16 Z" fill="#478CBF" opacity="0.55"/>
  <circle cx="11" cy="13" r="1.6" fill="#FFEB3B"/>

  <!-- Section title (yellow) -->
  <line x1="10" y1="22" x2="28" y2="22" stroke="#FFEB3B" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Widget rows: label (blue) + value (white/green) -->
  <g stroke-linecap="round" stroke-width="1.8">
    <line x1="10" y1="29" x2="22" y2="29" stroke="#A8C8FF"/>
    <line x1="36" y1="29" x2="50" y2="29" stroke="#FFFFFF"/>

    <line x1="10" y1="35" x2="26" y2="35" stroke="#A8C8FF"/>
    <line x1="40" y1="35" x2="50" y2="35" stroke="#5CDB95"/>

    <line x1="10" y1="41" x2="20" y2="41" stroke="#A8C8FF"/>
    <line x1="34" y1="41" x2="50" y2="41" stroke="#FFFFFF"/>
  </g>

  <!-- FPS spike graph at the bottom — the "live data" signature -->
  <polyline points="10,52 18,48 26,50 34,45 42,49 50,44"
            stroke="#5CDB95" stroke-width="1.8" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
